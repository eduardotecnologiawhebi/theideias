<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>theideias - Em breve</title>
    <style>
        :root {
            --orange-logo: #ff4500;
            --blue-whatsapp: #25d366;
            --blue-email: #007bff;
            --text-color: #333;
            --sub-text-color: #666;
            --bg-color: #f7f9fc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        .maintenance-container {
            text-align: center;
            background-color: #fff;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .logo-box {
            position: relative;
            margin-bottom: 30px;
        }

        .main-logo {
            width: 300px; /* Ajuste conforme necessário */
            height: auto;
            position: relative;
            z-index: 2;
        }

        /* Animação criativa: círculos de 'ideias' flutuando atrás do logo */
        .idea-bubble {
            position: absolute;
            background-color: rgba(255, 69, 0, 0.1);
            border-radius: 50%;
            z-index: 1;
            animation: float-idea 6s infinite ease-in-out;
        }

        .bubble-1 { width: 60px; height: 60px; top: -20px; left: -30px; animation-delay: 0s; }
        .bubble-2 { width: 40px; height: 40px; bottom: -10px; right: -20px; animation-delay: 1.5s; background-color: rgba(37, 211, 102, 0.1); }
        .bubble-3 { width: 50px; height: 50px; top: 30px; right: -40px; animation-delay: 3s; background-color: rgba(0, 123, 255, 0.1); }

        @keyframes float-idea {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(10px, -20px) scale(1.1); opacity: 0.8; }
        }

        h1 {
            color: var(--orange-logo);
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: var(--sub-text-color);
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .contact-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 200px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-whatsapp {
            background-color: var(--blue-whatsapp);
        }

        .btn-email {
            background-color: var(--blue-email);
        }

        /* Animação suave para os botões aparecerem */
        .maintenance-container {
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="maintenance-container">
        <div class="logo-box">
            <div class="idea-bubble bubble-1"></div>
            <div class="idea-bubble bubble-2"></div>
            <div class="idea-bubble bubble-3"></div>
            <img src="logo_theideias.webp" alt="Logo theideias" class="main-logo">
        </div>

        <h1>Estamos preparando novas theideias.</h1>
        <p>Nosso site está em manutenção para trazer inovação e criatividade ainda melhores para você. Voltaremos em breve!</p>

        <div class="contact-buttons">
            <a href="https://wa.me/SEU_NUMERO_AQUI" class="btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="mailto:contato@theideias.com.br" class="btn btn-email">
                <i class="fas fa-envelope"></i> E-mail
            </a>
        </div>
    </div>
</body>
</html>
